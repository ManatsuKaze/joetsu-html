<TITLE>高崎～新前橋編　路線の移り変わり　スライド-真夏の風</TITLE>


<SCRIPT TYPE="text/JavaScript">
<!--
var number = 20;
var delay = 4000;
var frame = -1;
var timeout_id = null;
var n=0;
var filename = new Array("050.gif",
"100.gif","101.gif","102.gif",
"103.gif","104.gif","105.gif",
"106.gif","107.gif","108.gif",
"109.gif","110.gif","111.gif",
"113.gif","114.gif",
"115.gif","116.gif","117.gif",
"118.gif","150.gif","160.jpg")
var images = new Array(number);
var end = Math.floor(filename.length/3)
for(var i=0; i<end; i++) {
images[i] = new Image();
images[i].src = "image/" + filename[i];
}

function animate() {
frame++;
if (frame>=filename.length) {
	frame=0;
}
document.slideshow.src = images[frame].src;
if((end+n) < filename.length){
	images[end+n]=new Image();
	images[end+n].src="image/" + filename[end+n];
	++n;
}
timeout_id = setTimeout("animate()", delay);
}

function showFrame(mode) {
if(mode==0) {
	++frame;
	if (frame>=filename.length) {
		frame=0;
	}
}
else {
	--frame;
	if(frame<0) {
		frame=filename.length-1;
	}
}
	if((end+n) < frame){
		images[frame]=new Image();
		images[frame].src="image/" + filename[frame];
	}
	else {
	if((end+n) < filename.length){
		images[end+n]=new Image();
		images[end+n].src="image/" + filename[end+n];
		++n;
	}
}
document.slideshow.src = images[frame].src;
}
//-->
</SCRIPT>

      <TD align="center" valign="middle" bgcolor="#e8ffe8"><INPUT type="button" value="自動" onclick="if (timeout_id == null) animate()" style="font-size : 15px;font-weight : bold;color : #ffffff;background-color : #002800;width : 45px;height : 22px;"><BR>
      <BR>
      <INPUT type="button" value="停止" onclick="if (timeout_id) clearTimeout(timeout_id); timeout_id=null;" style="font-size : 15px;font-weight : bold;color : #ffffff;background-color : #002800;width : 45px;height : 22px;"><BR>
      <BR>
      <INPUT type="button" value="前へ" onclick="if (timeout_id) clearTimeout(timeout_id); timeout_id=null; showFrame(1);" style="font-size : 15px;font-weight : bold;color : #ffffff;background-color : #002800;width : 45px;height : 22px;"><BR>
      <BR>
      <INPUT type="button" value="次へ" onclick="if (timeout_id) clearTimeout(timeout_id); timeout_id=null; showFrame(0);" style="font-size : 35px;font-weight : bolder;color : white;background-color : #002800;width : 85px;height : 40px;"><BR>
      </TD>
